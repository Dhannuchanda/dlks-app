<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d66b"/>
      <stop offset="50%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#e8721c"/>
    </linearGradient>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8721c"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef7ea"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#glow)" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Lotus petals bottom -->
  <g transform="translate(60,85)">
    <ellipse cx="-25" cy="0" rx="14" ry="6" fill="#e8721c" opacity="0.6" transform="rotate(-30)"/>
    <ellipse cx="25" cy="0" rx="14" ry="6" fill="#e8721c" opacity="0.6" transform="rotate(30)"/>
    <ellipse cx="-15" cy="-3" rx="14" ry="6" fill="#d4a017" opacity="0.7" transform="rotate(-15)"/>
    <ellipse cx="15" cy="-3" rx="14" ry="6" fill="#d4a017" opacity="0.7" transform="rotate(15)"/>
    <ellipse cx="0" cy="-5" rx="13" ry="6" fill="#f5d66b" opacity="0.8"/>
  </g>
  <!-- Goddess Lakshmi silhouette -->
  <g transform="translate(60,52)">
    <!-- Head -->
    <circle cx="0" cy="-18" r="9" fill="url(#saffron)"/>
    <!-- Crown -->
    <path d="M-8,-27 L-5,-35 L0,-30 L5,-35 L8,-27" fill="url(#gold)" stroke="#d4a017" stroke-width="0.5"/>
    <circle cx="0" cy="-32" r="2" fill="#f5d66b"/>
    <!-- Body -->
    <path d="M-6,-9 Q-8,5 -15,18 Q0,22 15,18 Q8,5 6,-9 Z" fill="url(#saffron)"/>
    <!-- Left arm -->
    <path d="M-6,-5 Q-20,-8 -28,2" stroke="url(#saffron)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Left hand lotus -->
    <circle cx="-29" cy="2" r="4" fill="#f5d66b" opacity="0.9"/>
    <circle cx="-29" cy="2" r="2" fill="#e8721c"/>
    <!-- Right arm -->
    <path d="M6,-5 Q20,-8 28,2" stroke="url(#saffron)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Right hand lotus -->
    <circle cx="29" cy="2" r="4" fill="#f5d66b" opacity="0.9"/>
    <circle cx="29" cy="2" r="2" fill="#e8721c"/>
    <!-- Halo -->
    <circle cx="0" cy="-18" r="14" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="-18" r="17" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Gold coins falling -->
  <circle cx="38" cy="65" r="3" fill="#f5d66b" opacity="0.7"/>
  <circle cx="45" cy="72" r="2.5" fill="#d4a017" opacity="0.6"/>
  <circle cx="82" cy="65" r="3" fill="#f5d66b" opacity="0.7"/>
  <circle cx="75" cy="72" r="2.5" fill="#d4a017" opacity="0.6"/>
  <circle cx="42" cy="78" r="2" fill="#f5d66b" opacity="0.5"/>
  <circle cx="78" cy="78" r="2" fill="#f5d66b" opacity="0.5"/>
</svg>
